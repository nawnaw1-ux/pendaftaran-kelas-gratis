<!DOCTYPE html>
<html>
<head>
    <title>Pendaftaran Kelas Coba Gratis</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>

<div class="container">
    <h2>Pendaftaran Kelas Coba Gratis</h2>

    <div class="main-content">
        <form id="formPendaftaran">
            <input type="hidden" id="id">

            <label>Nama Lengkap</label>
            <input type="text" id="nama">

            <label>Email</label>
            <input type="email" id="email">
            
            <label>No HP</label>
            <input type="number" id="no_hp">

            <label>Kelas</label>
            <select id="kelas">
                <option value="">-- Pilih Kelas --</option>
                <optgroup label="SD">
                    <option value="SD 4">SD 4</option>
                    <option value="SD 5">SD 5</option>
                    <option value="SD 6">SD 6</option>
                </optgroup>
                <optgroup label="SMP">
                    <option value="SMP 7">SMP 7</option>
                    <option value="SMP 8">SMP 8</option>
                    <option value="SMP 9">SMP 9</option>
                </optgroup>
            </select>

            <label>Metode Belajar</label>
            <select id="metode">
                <option value="">-- Pilih Metode --</option>
                <option value="Online">Online</option>
                <option value="Offline">Offline</option>
            </select>

            <button type="submit">Simpan</button>
        </form>

        <div id="previewCard" class="card-preview">
            <h3>DATA SAYA</h3>
            <div id="cardContent">
                <p class="placeholder-text">Belum ada data yang disimpan.</p>
            </div>
        </div>
    </div>

    <hr>

    <h3>Data Pendaftar (Dataset & Riwayat)</h3>
    <table id="tabelData">
        <thead>
            <tr>
                <th>Nama</th>
                <th>Email</th>
                <th>No HP</th>
                <th>Kelas</th>
                <th>Metode</th>
                <!-- <th>Aksi</th> -->
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
